name: Auto-retry failed deploys

# If "Build and deploy" fails (transient Pages errors, flaky data fetches),
# re-run just its failed jobs — up to 2 automatic retries (run_attempt < 3).
on:
  workflow_run:
    workflows: ["Build and deploy"]
    types: [completed]

permissions:
  actions: write

jobs:
  rerun:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: Re-run failed jobs (attempt ${{ github.event.workflow_run.run_attempt }} failed)
        run: gh api -X POST "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/rerun-failed-jobs"
        env:
          GH_TOKEN: ${{ github.token }}
