name: Build and deploy

on:
  push:
    branches: [main]
  schedule:
    # Daily at 09:20 UTC = 3:20am MDT / 2:20am MST — just after the sheet updates (~3:11am)
    - cron: '20 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch latest fire danger data
        run: npm run fetch-data

      - name: Commit refreshed data (scheduled runs keep last-good data in git)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/areas
          if ! git diff --cached --quiet; then
            git commit -m "Daily data refresh"
            # Re-runs/manual runs may have checked out an older commit; rebase onto
            # the current tip so the push can't fail as non-fast-forward.
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          else
            echo "No data changes — nothing to commit."
          fi

      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
