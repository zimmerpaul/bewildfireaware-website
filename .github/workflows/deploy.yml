name: Build and deploy

on:
  push:
    branches: [main]
  schedule:
    # Daily at 09:20 UTC = 3:20am MDT / 2:20am MST — just after the sheet updates (~3:11am)
    - cron: '20 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch latest fire danger data
        run: npm run fetch-data

      - name: Generate AI overviews (script self-skips when no API key is configured)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run generate-overviews

      - name: Commit refreshed data (scheduled runs keep last-good data in git)
        # Primary repo only — preview/mirror repos build with fresh data but
        # never write commits, so pushes to them stay fast-forward.
        if: github.repository == 'zimmerpaul/bewildfireaware' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/areas src/data/overviews 2>/dev/null || git add src/data/areas
          if ! git diff --cached --quiet; then
            git commit -m "Daily data refresh"
            # Re-runs/manual runs may have checked out an older commit; rebase onto
            # the current tip so the push can't fail as non-fast-forward.
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          else
            echo "No data changes — nothing to commit."
          fi

      - run: npm run build

      - name: Record build fingerprint
        id: fingerprint
        run: echo "datelabel=$(node -p "require('./src/data/areas/montrose_montrose.json').dateLabel")" >> "$GITHUB_OUTPUT"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
    outputs:
      datelabel: ${{ steps.fingerprint.outputs.datelabel }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # Pages deployments occasionally fail transiently ("try again later") —
      # retry once in-run before letting the workflow fail.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retrying failed deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}

  verify:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Verify live site serves this build's data
        run: |
          URL="${{ needs.deploy.outputs.page_url }}"
          WANT="${{ needs.build.outputs.datelabel }}"
          echo "Checking $URL against expected date label: $WANT"
          for i in $(seq 1 12); do
            GOT=$(curl -fsS "${URL%/}/map-data.json" | jq -r '.features[0].properties.updated' || echo "")
            echo "attempt $i: deployed data is '$GOT'"
            if [ "$GOT" = "$WANT" ]; then
              curl -fsS -o /dev/null "${URL%/}/" && echo "Homepage OK — deployment verified." && exit 0
            fi
            sleep 15
          done
          echo "::error::Deployed site does not match this build after 3 minutes."
          exit 1
